

version: "3.9"

networks:
  edumetrics:
    driver: bridge

volumes:
  zookeeper_data:
  kafka_data:

#  SERVICES 
services:

  #  Zookeeper 
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: edu_zookeeper
    networks: [edumetrics]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  #  Kafka Broker 
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: edu_kafka
    networks: [edumetrics]
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"       
      - "9093:9093"       
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka:9092,EXTERNAL://localhost:9093"
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_LISTENERS: "INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9093"

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1   
      KAFKA_NUM_PARTITIONS: 3               

      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 1073741824   

      KAFKA_LOG_FLUSH_INTERVAL_MESSAGES: 10000
      KAFKA_LOG_FLUSH_INTERVAL_MS: 1000
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  #  Topic provisioner 
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: edu_kafka_init
    networks: [edumetrics]
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      echo 'Creating EduMetrics Kafka topics...'
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
        --topic edu.enrollment          --partitions 3 --replication-factor 1 \
        --config retention.ms=604800000
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
        --topic edu.course_registration --partitions 3 --replication-factor 1 \
        --config retention.ms=604800000
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
        --topic edu.feedback            --partitions 3 --replication-factor 1 \
        --config retention.ms=604800000
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
        --topic edu.onboarding          --partitions 3 --replication-factor 1 \
        --config retention.ms=2592000000
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
        --topic edu.interaction_log     --partitions 6 --replication-factor 1 \
        --config retention.ms=259200000
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
        --topic edu.state_change        --partitions 3 --replication-factor 1 \
        --config retention.ms=7200000
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
        --topic edu.dlq                 --partitions 1 --replication-factor 1 \
        --config retention.ms=2592000000
      echo 'Topics created successfully.'
      kafka-topics --bootstrap-server kafka:9092 --list
      "
    restart: "no"

  #  Kafka UI 
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: edu_kafka_ui
    networks: [edumetrics]
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: "edumetrics-local"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9092"
      KAFKA_CLUSTERS_0_ZOOKEEPER: "zookeeper:2181"
    restart: unless-stopped

  #  Telegram Bot (Kafka Producer) 
  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: edu_bot
    networks: [edumetrics]
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      BOT_TOKEN:                 ${BOT_TOKEN}
      DATABASE_URL:              ${DATABASE_URL}
      KAFKA_BOOTSTRAP_SERVERS:   kafka:9092
      KAFKA_ENABLED:             "true"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import asyncpg; print('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3

  #  DB Consumer 
  db-consumer:
    build:
      context: .
      dockerfile: Dockerfile.consumer
    container_name: edu_db_consumer
    networks: [edumetrics]
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL:              ${DATABASE_URL}
      KAFKA_BOOTSTRAP_SERVERS:   kafka:9092
    command: ["python", "db_consumer.py"]
    restart: unless-stopped
  

  #  Analytics Consumer 
  analytics:
    build:
      context: .
      dockerfile: Dockerfile.consumer
    container_name: edu_analytics
    networks: [edumetrics]
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL:              ${DATABASE_URL}
      KAFKA_BOOTSTRAP_SERVERS:   kafka:9092
    command: ["python", "analytics_consumer.py"]
    restart: unless-stopped

